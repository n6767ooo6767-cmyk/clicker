<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Clicker: Ultimate Edition</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: #0b0b14;
            color: white;
            margin: 0;
            padding: 20px 0;
            user-select: none;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
            margin-bottom: 5px;
        }
        .stats-container {
            background: #15152b;
            padding: 15px;
            margin: 15px auto;
            width: 85%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,204,0.1);
            text-align: left;
            border: 1px solid #222244;
        }
        .stat-line {
            font-size: 18px;
            margin: 8px 0;
            font-weight: bold;
        }
        .stat-val {
            color: #00ffcc;
            float: right;
        }
        
        /* ГЛАВНАЯ КНОПКА ДЛЯ ТАПАНИЯ */
        .click-btn {
            display: block;
            width: 200px;
            height: 200px;
            line-height: 200px;
            margin: 30px auto;
            background: linear-gradient(135deg, #00ffcc, #007bff);
            color: white;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.1s;
            border: 4px solid #0b0b14;
        }
        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(0,255,204,0.6);
        }
        
        /* КНОПКА КУПИТЬ АВТОКЛИКЕР */
        .upgrade-btn {
            display: inline-block;
            background: #ffc107;
            color: black;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(255,193,7,0.3);
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .upgrade-btn:active {
            transform: scale(0.97);
        }
        .disabled {
            background: #555 !important;
            color: #888 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }

        /* УВЕДОМЛЕНИЕ О ЧИТАХ */
        #cheat-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            animation: popUp 0.3s ease;
        }
        @keyframes popUp {
            from { bottom: -50px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>🌐 ULTIMATE WEB CLICKER 🌐</h1>
    <p style="color: #888; font-size: 14px; margin: 0;">Вводи чит-коды прямо на клавиатуре!</p>
    
    <div class="stats-container">
        <div class="stat-line">💰 Монеты: <span id="coins-display" class="stat-val">0</span></div>
        <div class="stat-line">🤖 Автокликеры: <span id="auto-display" class="stat-val">0</span></div>
        <div class="stat-line">🔥 Комбо: <span id="combo-display" class="stat-val">0</span></div>
        <div class="stat-line">⚡ Буст: <span id="boost-display" class="stat-val" style="color: #ff5722;">Нет</span></div>
    </div>
    
    <div id="click-target" class="click-btn">ТАПАЙ!</div>
    
    <button id="upgrade-target" class="upgrade-btn">Купить Автокликер (Цена: $<span id="cost-display">100</span>)</button>

    <div id="cheat-toast">ЧИТ-КОД АКТИВИРОВАН!</div>

    <script>
        // Переменные игры
        let coins = 0;
        let autoclickers = 0;
        let upgradeCost = 100;
        let comboCount = 0;
        let lastClickTime = 0;
        
        let boostX10Active = false;
        let boostX10EndTime = 0;
        let permanentX5Active = false;

        // Для отслеживания клавиатурных читов
        let inputSequence = [];
        let lastInputTime = 0;
        
        // Мапинг стрелочек для ввода читов с клавиатуры
        const keyMap = {
            "KeyB": "b",
            "KeyA": "a",
            "ArrowLeft": "left",
            "ArrowRight": "right"
        };

        // Обновление интерфейса
        function updateUI() {
            document.getElementById("coins-display").innerText = Math.floor(coins).toLocaleString();
            document.getElementById("auto-display").innerText = autoclickers;
            document.getElementById("cost-display").innerText = upgradeCost;
            
            // Отображение Комбо
            if (comboCount >= 26) {
                document.getElementById("combo-display").innerText = "ULTRA! (x2)";
                document.getElementById("combo-display").style.color = "#ff007f";
            } else {
                document.getElementById("combo-display").innerText = comboCount;
                document.getElementById("combo-display").style.color = "#00ffcc";
            }

            // Отображение Бустов
            let boostText = "Нет";
            if (boostX10Active) {
                let timeLeft = Math.max(0, Math.ceil((boostX10EndTime - Date.now()) / 1000));
                boostText = `АКТИВЕН X10 (${timeLeft}с) 🔥`;
                if (timeLeft <= 0) boostX10Active = false;
            } else if (permanentX5Active) {
                boostText = "ВЕЧНЫЙ X5! 👑";
            }
            document.getElementById("boost-display").innerText = boostText;

            // Доступность кнопки покупки
            let upBtn = document.getElementById("upgrade-target");
            if (coins >= upgradeCost) {
                upBtn.classList.remove("disabled");
            } else {
                upBtn.classList.add("disabled");
            }
        }

        // Функция всплывающего уведомления о читах
        function showCheatToast(text) {
            let toast = document.getElementById("cheat-toast");
            toast.innerText = text;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }

        // ОБЫЧНЫЙ КЛИК ПО ЭКРАНУ
        document.getElementById("click-target").addEventListener("click", () => {
            let currentTime = Date.now();
            
            // Проверка комбо-таймера (5 секунд)
            if (currentTime - lastClickTime <= 5000) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastClickTime = currentTime;

            // Расчет награды
            let reward = (comboCount >= 26) ? 2 : 1;
            if (permanentX5Active) reward *= 5;
            if (boostX10Active) reward *= 10;

            coins += reward;
            updateUI();
        });

        // ПОКУПКА АВТОКЛИКЕРА
        document.getElementById("upgrade-target").addEventListener("click", () => {
            if (coins >= upgradeCost) {
                coins -= upgradeCost;
                autoclickers++;
                upgradeCost += 100;
                updateUI();
            }
        });

        // РАБОТА АВТОКЛИКЕРОВ (Каждую секунду)
        setInterval(() => {
            if (autoclickers > 0) {
                let income = autoclickers;
                if (permanentX5Active) income *= 5;
                if (boostX10Active) income *= 10;
                
                coins += income;
                updateUI();
            }
        }, 1000);

        // Таймер для ежесекундного обновления времени буста x10 на экране
        setInterval(() => {
            if (boostX10Active) updateUI();
            
            // Сброс комбо по таймеру (5 сек)
            if (comboCount > 0 && (Date.now() - lastClickTime > 5000)) {
                comboCount = 0;
                updateUI();
            }
        }, 1000);

        // СИСТЕМА ДЛЯ СЧИТЫВАНИЯ ЧИТ-КОДОВ С КЛАВИАТУРЫ
        window.addEventListener("keydown", (e) => {
            if (keyMap[e.code]) {
                let currentTime = Date.now();
                
                // Если пауза больше 3.5 секунд, сбрасываем буфер
                if (currentTime - lastInputTime > 3500) inputSequence = [];
                
                lastInputTime = currentTime;
                inputSequence.push(keyMap[e.code]);
                
                if (inputSequence.length > 12) inputSequence.shift();
                
                let historyStr = inputSequence.join(",");

                // 1. Чит-код: b,b,a,left,right (+10 автокликеров)
                if (historyStr.endsWith("b,b,a,left,right")) {
                    autoclickers += 10;
                    inputSequence = [];
                    showCheatToast("🚀 Читер! Получено +10 автокликеров!");
                    updateUI();
                }
                
                // 2. Чит-код: a,a,left (Буст х10 на 5 минут)
                if (historyStr.endsWith("a,a,left")) {
                    boostX10Active = true;
                    boostX10EndTime = Date.now() + (5 * 60 * 1000); // 5 минут в миллисекундах
                    inputSequence = [];
                    showCheatToast("🔥 РЕЖИМ БОГА: Буст x10 на 5 минут!");
                    updateUI();
                }

                // 3. Чит-код: b,b,b,a,a,right,right (Вечный х5)
                if (historyStr.endsWith("b,b,b,a,a,right,right")) {
                    permanentX5Active = true;
                    inputSequence = [];
                    showCheatToast("👑 УЛЬТИМЕЙТ: Бесконечный множитель x5!");
                    updateUI();
                }
            }
        });

        // Первое обновление игры
        updateUI();
    </script>
</body>
</html>
