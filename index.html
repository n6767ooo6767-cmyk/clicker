<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Clicker: Secret Edition</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: #0b0b14;
            color: white;
            margin: 0;
            padding: 20px 0;
            user-select: none;
        }
        
        /* СЕКРЕТНЫЙ ЗАГОЛОВОК (Кликни 3 раза!) */
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
            margin-bottom: 5px;
            cursor: default;
        }
        
        .stats-container {
            background: #15152b;
            padding: 15px;
            margin: 15px auto;
            width: 85%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,204,0.1);
            text-align: left;
            border: 1px solid #222244;
        }
        .stat-line {
            font-size: 18px;
            margin: 8px 0;
            font-weight: bold;
        }
        .stat-val {
            color: #00ffcc;
            float: right;
        }
        
        /* ГЛАВНАЯ КНОПКА ДЛЯ ТАПАНИЯ */
        .click-btn {
            display: block;
            width: 200px;
            height: 200px;
            line-height: 200px;
            margin: 40px auto;
            background: linear-gradient(135deg, #00ffcc, #007bff);
            color: white;
            font-size: 32px;
            font-weight: bold;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4);
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.1s;
            border: 4px solid #0b0b14;
        }
        .click-btn:active {
            transform: scale(0.92);
            box-shadow: 0 5px 15px rgba(0,255,204,0.6);
        }

        /* УВЕДОМЛЕНИЕ О ЧИТАХ */
        #cheat-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            animation: popUp 0.3s ease;
        }

        /* СЕКРЕТНОЕ ОКНО С IP */
        #secret-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111122;
            border: 2px solid #ff007f;
            box-shadow: 0 0 30px #ff007f;
            padding: 25px;
            border-radius: 15px;
            z-index: 200;
            width: 280px;
        }
        #secret-modal h2 {
            color: #ff007f;
            margin-top: 0;
            font-size: 20px;
        }
        .close-modal-btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 8px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes popUp {
            from { bottom: -50px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }
    </style>
</head>
<body>

    <h1 id="secret-trigger">🌐 ULTIMATE WEB CLICKER 🌐</h1>
    <p style="color: #444; font-size: 12px; margin: 0;">Клавиатурные читы активны</p>
    
    <div class="stats-container">
        <div class="stat-line">💰 Монеты: <span id="coins-display" class="stat-val">0</span></div>
        <div class="stat-line">🤖 Автокликеры: <span id="auto-display" class="stat-val">0</span></div>
        <div class="stat-line">🔥 Комбо: <span id="combo-display" class="stat-val">0</span></div>
        <div class="stat-line">⚡ Буст: <span id="boost-display" class="stat-val" style="color: #ff5722;">Нет</span></div>
    </div>
    
    <div id="click-target" class="click-btn">ТАПАЙ!</div>

    <div id="cheat-toast">ЧИТ-КОД АКТИВИРОВАН!</div>

    <div id="secret-modal">
        <h2>💻 ADMIN IP PANEL 💻</h2>
        <p style="font-size: 14px; color: #aaa;">Текущие координаты сервера:</p>
        <p style="font-size: 24px; color: #ff007f; font-weight: bold; letter-spacing: 1px;">192.168.0.21</p>
        <button class="close-modal-btn" id="close-modal">ЗАКРЫТЬ</button>
    </div>

    <script>
        let coins = 0;
        let autoclickers = 0;
        let comboCount = 0;
        let lastClickTime = 0;
        
        let boostX10Active = false;
        let boostX10EndTime = 0;
        let permanentX5Active = false;

        let inputSequence = [];
        let lastInputTime = 0;
        
        let secretClickCount = 0;
        let lastSecretClickTime = 0;
        
        const keyMap = {
            "KeyB": "b",
            "KeyA": "a",
            "ArrowLeft": "left",
            "ArrowRight": "right"
        };

        function updateUI() {
            document.getElementById("coins-display").innerText = Math.floor(coins).toLocaleString();
            document.getElementById("auto-display").innerText = autoclickers;
            
            if (comboCount >= 26) {
                document.getElementById("combo-display").innerText = "ULTRA! (x2)";
                document.getElementById("combo-display").style.color = "#ff007f";
            } else {
                document.getElementById("combo-display").innerText = comboCount;
                document.getElementById("combo-display").style.color = "#00ffcc";
            }

            let boostText = "Нет";
            if (boostX10Active) {
                let timeLeft = Math.max(0, Math.ceil((boostX10EndTime - Date.now()) / 1000));
                boostText = `АКТИВЕН X10 (${timeLeft}с) 🔥`;
                if (timeLeft <= 0) boostX10Active = false;
            } else if (permanentX5Active) {
                boostText = "ВЕЧНЫЙ X5! 👑";
            }
            document.getElementById("boost-display").innerText = boostText;
        }

        function showCheatToast(text) {
            let toast = document.getElementById("cheat-toast");
            toast.innerText = text;
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 3000);
        }

        // КЛИК ПО ГЛАВНОЙ КНОПКЕ
        document.getElementById("click-target").addEventListener("click", () => {
            let currentTime = Date.now();
            if (currentTime - lastClickTime <= 5000) {
                comboCount++;
            } else {
                comboCount = 1;
            }
            lastClickTime = currentTime;

            let reward = (comboCount >= 26) ? 2 : 1;
            if (permanentX5Active) reward *= 5;
            if (boostX10Active) reward *= 10;

            coins += reward;
            updateUI();
        });

        // АВТОКЛИКЕРЫ (Работают в фоне)
        setInterval(() => {
            if (autoclickers > 0) {
                let income = autoclickers;
                if (permanentX5Active) income *= 5;
                if (boostX10Active) income *= 10;
                coins += income;
                updateUI();
            }
        }, 1000);

        setInterval(() => {
            if (boostX10Active) updateUI();
            if (comboCount > 0 && (Date.now() - lastClickTime > 5000)) {
                comboCount = 0;
                updateUI();
            }
        }, 1000);

        // ЛОГИКА СЕКРЕТНОЙ КНОПКИ (3 быстрых клика по заголовку)
        document.getElementById("secret-trigger").addEventListener("click", () => {
            let now = Date.now();
            if (now - lastSecretClickTime > 1500) secretClickCount = 0; // Сброс если кликаешь слишком медленно
            
            lastSecretClickTime = now;
            secretClickCount++;
            
            if (secretClickCount === 3) {
                document.getElementById("secret-modal").style.display = "block";
                secretClickCount = 0; // Сброс
            }
        });

        // Закрытие секретного окна
        document.getElementById("close-modal").addEventListener("click", () => {
            document.getElementById("secret-modal").style.display = "none";
        });

        // КЛАВИАТУРНЫЕ ЧИТЫ
        window.addEventListener("keydown", (e) => {
            if (keyMap[e.code]) {
                let currentTime = Date.now();
                if (currentTime - lastInputTime > 3500) inputSequence = [];
                
                lastInputTime = currentTime;
                inputSequence.push(keyMap[e.code]);
                if (inputSequence.length > 12) inputSequence.shift();
                
                let historyStr = inputSequence.join(",");

                if (historyStr.endswith || historyStr.endsWith("b,b,a,left,right")) {
                    autoclickers += 10;
                    inputSequence = [];
                    showCheatToast("🚀 Добавлено +10 автокликеров!");
                    updateUI();
                }
                if (historyStr.endsWith("a,a,left")) {
                    boostX10Active = true;
                    boostX10EndTime = Date.now() + (5 * 60 * 1000);
                    inputSequence = [];
                    showCheatToast("🔥 Буст x10 активирован на 5 минут!");
                    updateUI();
                }
                if (historyStr.endsWith("b,b,b,a,a,right,right")) {
                    permanentX5Active = true;
                    inputSequence = [];
                    showCheatToast("👑 Активирован вечный множитель x5!");
                    updateUI();
                }
            }
        });

        updateUI();
    </script>
</body>
</html>
